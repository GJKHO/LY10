<!DOCTYPE HTML>
<html>

<head>
  <title>Jewels Blitz 6</title>
  <meta charset="utf-8">
  <meta name="format-detection" content="telephone=no">
  <meta name="HandheldFriendly" content="true" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Phaser App">
  <meta name="viewport"
    content="width=device-width, initial-scale=1, user-scalable=no, minimum-scale=1.0, maximum-scale=1.01">

  <link rel="stylesheet" href="css/stylesheet.css" type="text/css" charset="utf-8" />
  <meta name="screen-orientation" content="portrait" />
  <style type="text/css">
    #orientation {
      margin: 0 auto;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 110%;
      background-image: url('img/rotate.jpg');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      background-color: rgb(0, 0, 0);
      z-index: 999;
      display: none;
    }
  </style>


  <!-- Telegram Web App SDK：必须在其他脚本之前加载 -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script type="text/javascript">
    try {
      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
      }
    } catch (e) { console.log('Telegram WebApp init failed:', e); }
  </script>
  <!-- Adsgram 广告 SDK -->
  <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
  <style>
    #tg-ad-layer {
      position: fixed;
      bottom: 16px;
      left: 16px;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      pointer-events: none;
    }
    #tg-reward-btn {
      pointer-events: auto;
      font-size: 15px;
      padding: 10px 18px;
      background: linear-gradient(135deg, #00b4d8, #0096c7);
      color: #fff;
      border: none;
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.5);
      cursor: pointer;
      display: none;
    }
    #tg-reward-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #tg-score-toast {
      pointer-events: none;
      font-size: 22px;
      font-weight: bold;
      color: #FFD700;
      text-shadow: 0 0 8px #000;
      display: none;
      animation: floatUp 1.2s ease forwards;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-60px); }
    }
  </style>

  <!-- production -->
  <script>
    window.jsInitTime = Date.now(); // set earliest javascript execution time
  </script>
</head>

<body>
  <div id="orientation"></div>
  <div id="gameFontPreload" class="unselectable">
    <div style="font-family: RubikBold" class='fontPreload'>.</div>
    <script type="text/javascript" src="./sdk/ad.min.js"></script>
    <script src="js/ua-parser.min.js"></script>
    <script src="js/custom-phaser.min.js"></script>
    <script src="js/phaser-debug.js"></script>
    <script src="js/phaser-nineslice-softgames.js"></script>
    <script id="lzutf8" src="js/lzutf8.min.js"></script>
    <script src="js/game.js"></script>
    <script src="AzerionWrapper-2.x.min.js"></script>
  </div>
  <script>

    // initGame();

    window.onWrapperReady = () => {
      window._ = _; // create global ref for lodash

      if (window.G != undefined) {
        //console.error("来是")

        initGame();
        return;
      }

      var iID = setInterval(() => {
        if (G) {
          //console.error("哪里来的")
          initGame();
          clearInterval(iID);
        }
      }, 200);
    };
  </script>

  <!-- ================= Adsgram 广告区 ================= -->
  <div id="tg-ad-layer">
    <div id="tg-score-toast">+200</div>
    <button id="tg-reward-btn" onclick="tgShowRewardAd()">📺 Watch Ad +200</button>
  </div>

  <script type="text/javascript">
  (function () {
    var REWARD_AMOUNT = 200;
    var AdController = null;
    var IntAdController = null;

    // 奖励回调：游戏脚本可覆盖此函数以真正加分（window.onAdsgramReward = fn）
    if (typeof window.onAdsgramReward !== 'function') {
      window.onAdsgramReward = function () {};
    }

    // 从 ID.txt 读取广告位 ID，格式 KEY=VALUE，每行一个
    function loadConfig(cb) {
      fetch('ID.txt?_=' + Date.now())
        .then(function (r) { return r.text(); })
        .then(function (text) {
          var cfg = {};
          text.split('\n').forEach(function (line) {
            var parts = line.trim().split('=');
            if (parts.length === 2) cfg[parts[0].trim()] = parts[1].trim();
          });
          cb(cfg);
        })
        .catch(function () { cb({}); });
    }

    function initAds(cfg) {
      if (!window.Adsgram) return;
      var rewardId = cfg['REWARD_BLOCK_ID'] || '';
      var intId    = cfg['INT_BLOCK_ID']    || '';
      try { if (rewardId) AdController    = window.Adsgram.init({ blockId: rewardId }); } catch (e) {}
      try { if (intId)    IntAdController = window.Adsgram.init({ blockId: intId });    } catch (e) {}

      document.getElementById('tg-reward-btn').style.display = 'block';
      startIntAdTimer();
    }

    function waitAndInit(cfg) {
      if (window.Adsgram) {
        initAds(cfg);
      } else {
        var sdkCheck = setInterval(function () {
          if (window.Adsgram) { clearInterval(sdkCheck); initAds(cfg); }
        }, 300);
      }
    }

    loadConfig(function (cfg) { waitAndInit(cfg); });

    // 激励广告：看完 +200
    window.tgShowRewardAd = function () {
      if (!AdController) return;
      var btn = document.getElementById('tg-reward-btn');
      btn.disabled = true;
      AdController.show().then(function () {
        if (typeof window.onAdsgramReward === 'function') {
          window.onAdsgramReward(REWARD_AMOUNT);
        }
        var toast = document.getElementById('tg-score-toast');
        toast.textContent = '+' + REWARD_AMOUNT;
        toast.style.display = 'block';
        toast.style.animation = 'none';
        setTimeout(function () {
          toast.style.animation = 'floatUp 1.2s ease forwards';
          setTimeout(function () { toast.style.display = 'none'; }, 1200);
        }, 20);
        // 60 秒冷却
        var cd = 60;
        btn.textContent = '⏳ ' + cd + 's';
        var cdTimer = setInterval(function () {
          cd--;
          if (cd <= 0) {
            clearInterval(cdTimer);
            btn.disabled = false;
            btn.textContent = '📺 Watch Ad +' + REWARD_AMOUNT;
          } else {
            btn.textContent = '⏳ ' + cd + 's';
          }
        }, 1000);
      }).catch(function () {
        btn.disabled = false;
      });
    };

    // 插屏广告：每 30 秒自动弹出
    var intAdInterval = null;
    function startIntAdTimer() {
      if (intAdInterval) clearInterval(intAdInterval);
      intAdInterval = setInterval(function () {
        if (!IntAdController) return;
        IntAdController.show().then(function () {}).catch(function () {});
      }, 30000);
    }
  })();
  </script>
</body>

</html>
